<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Dashboard – JobPortal</title>
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Source Sans 3', 'Helvetica Neue', Arial, sans-serif; background: #f3f2ef; min-height: 100vh; display: flex; flex-direction: column; color: #111; }

    /* NAV */
    header { background: #fff; border-bottom: 1px solid #e0e0e0; padding: 0 24px; height: 52px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
    .brand { font-size: 1.45rem; font-weight: 700; color: #0a66c2; text-decoration: none; letter-spacing: -0.5px; }
    .brand em { color: #333; font-style: normal; }
    nav { display: flex; align-items: center; gap: 8px; }
    nav a { font-size: 0.88rem; color: #555; text-decoration: none; padding: 6px 14px; border-radius: 24px; font-weight: 600; transition: background 0.15s, color 0.15s; }
    nav a:hover { background: #f3f2ef; color: #111; }
    nav .btn-browse { background: #0a66c2; color: #fff; }
    nav .btn-browse:hover { background: #004182; }
    nav .btn-logout { color: #888; }

    /* LAYOUT */
    main { flex: 1; max-width: 900px; width: 100%; margin: 32px auto; padding: 0 16px; }

    /* PROFILE BAR */
    .profile-bar { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 20px 24px; display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }
    .avatar { width: 52px; height: 52px; border-radius: 50%; background: #057642; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; font-weight: 700; flex-shrink: 0; }
    .profile-info h2 { font-size: 1.1rem; font-weight: 700; color: #111; }
    .profile-info p { font-size: 0.85rem; color: #777; margin-top: 2px; }
    .profile-bar .ml { margin-left: auto; }
    .stats-row { display: flex; gap: 32px; }
    .stat { text-align: center; }
    .stat .num { font-size: 1.4rem; font-weight: 700; color: #0a66c2; }
    .stat .lbl { font-size: 0.75rem; color: #777; }

    /* SECTION */
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .section-header h3 { font-size: 1rem; font-weight: 700; color: #111; }
    .btn-sm { font-size: 0.82rem; font-weight: 700; color: #0a66c2; border: 1.5px solid #0a66c2; background: transparent; padding: 6px 14px; border-radius: 24px; cursor: pointer; font-family: inherit; text-decoration: none; transition: background 0.15s; display: inline-block; }
    .btn-sm:hover { background: #e8f0fb; }

    /* APPLICATION ROW */
    .app-row { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; margin-bottom: 8px; transition: border-color 0.15s; }
    .app-row:hover { border-color: #b0b0b0; }
    .app-row h4 { font-size: 0.95rem; font-weight: 700; color: #111; margin-bottom: 3px; }
    .app-row .meta { font-size: 0.82rem; color: #777; }
    .app-row .meta span { margin-right: 14px; }

    /* STATUS BADGES */
    .badge { display: inline-block; font-size: 0.75rem; font-weight: 700; padding: 3px 10px; border-radius: 24px; text-transform: uppercase; letter-spacing: 0.03em; }
    .badge-applied   { background: #e8f0fb; color: #0a66c2; }
    .badge-reviewed  { background: #fff3cd; color: #856404; }
    .badge-selected  { background: #d4edda; color: #155724; }
    .badge-rejected  { background: #fdecea; color: #b00020; }

    /* EMPTY */
    .empty { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 48px 24px; text-align: center; color: #999; }
    .empty h4 { font-size: 1rem; font-weight: 600; color: #555; margin-bottom: 6px; }
    .empty p { font-size: 0.85rem; margin-bottom: 18px; }

    footer { background: #fff; border-top: 1px solid #e0e0e0; padding: 16px 24px; text-align: center; margin-top: auto; }
    .flinks { display: flex; flex-wrap: wrap; justify-content: center; gap: 4px 20px; margin-bottom: 6px; }
    .flinks a { font-size: 0.75rem; color: #777; text-decoration: none; }
    .flinks a:hover { text-decoration: underline; color: #333; }
    footer small { font-size: 0.72rem; color: #aaa; }
  </style>
</head>
<body>

<header>
  <a class="brand" href="/dashboard">Job<em>Portal</em></a>
  <nav>
    <a href="/jobs" class="btn-browse">Browse Jobs</a>
    <form th:action="@{/logout}" method="post" style="display:inline;">
    <button type="submit" class="btn-logout"
            style="background:none;border:none;cursor:pointer;font-family:inherit;font-size:0.88rem;font-weight:600;color:#888;padding:6px 14px;border-radius:24px;">
        Sign out
    </button>
</form>
  </nav>
</header>

<main>
  <!-- Profile bar -->
  <div class="profile-bar">
    <div class="avatar" th:text="${user.fullName.substring(0,1).toUpperCase()}">J</div>
    <div class="profile-info">
      <h2 th:text="${user.fullName}">Job Seeker Name</h2>
      <p th:text="${user.email}">seeker@email.com</p>
    </div>
    <div class="ml stats-row">
      <div class="stat">
        <div class="num" th:text="${myApplications != null ? myApplications.size() : 0}">0</div>
        <div class="lbl">Applications</div>
      </div>
    </div>
  </div>

  <!-- Applications list -->
  <div class="section-header">
    <h3>My Applications</h3>
    <a href="/jobs" class="btn-sm">Browse jobs</a>
  </div>

  <div th:if="${myApplications == null or myApplications.isEmpty()}" class="empty">
    <h4>No applications yet</h4>
    <p>Start applying to jobs and track your progress here.</p>
    <a href="/jobs" class="btn-sm">Browse jobs</a>
  </div>

  <div th:each="app : ${myApplications}" class="app-row">
    <div>
      <h4 th:text="${app.job.title}">Job Title</h4>
      <div class="meta">
        <span th:text="${app.job.company}">Company</span>
        <span th:text="${app.job.location}">Location</span>
      </div>
    </div>
    <span class="badge"
      th:classappend="${app.status.name() == 'APPLIED'   ? 'badge-applied'   :
                        app.status.name() == 'REVIEWED'  ? 'badge-reviewed'  :
                        app.status.name() == 'SELECTED'  ? 'badge-selected'  :
                        'badge-rejected'}"
      th:text="${app.status}">APPLIED</span>
  </div>
</main>

<footer>
  <div class="flinks">
    <a href="#">About</a><a href="#">Help Center</a><a href="#">Privacy Policy</a><a href="#">Terms of Service</a>
  </div>
  <small>JobPortal &copy; 2026</small>
</footer>

</body>
</html>
